<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TzufGuard</title>
        <meta
            name="description"
            content="TzufGuard is getting ready to protect more doors."
        />
        <style>
            :root {
                --bg: #f7f3ea;
                --ink: #202124;
                --muted: #5f6368;
                --accent: #1f7a6d;
                --line: rgba(32, 33, 36, 0.14);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 32px;
                color: var(--ink);
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                    radial-gradient(circle at 20% 20%, #ffffff 0, transparent 34%),
                    linear-gradient(135deg, #f7f3ea 0%, #dcebe7 52%, #f4d9cf 100%);
            }

            main {
                width: min(100%, 720px);
                padding: clamp(32px, 8vw, 72px);
                border: 1px solid var(--line);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.72);
                box-shadow: 0 24px 80px rgba(32, 33, 36, 0.12);
            }

            .eyebrow {
                margin: 0 0 18px;
                color: var(--accent);
                font-size: 0.86rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            h1 {
                margin: 0;
                max-width: 12ch;
                font-size: clamp(2.7rem, 8vw, 5.8rem);
                line-height: 0.94;
                font-weight: 800;
            }

            p {
                margin: 28px 0 0;
                max-width: 58ch;
                color: var(--muted);
                font-size: clamp(1.05rem, 2vw, 1.25rem);
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <main>
            <p class="eyebrow">TzufGuard</p>
            <h1>Working on something new.</h1>
            <p>
                The smart-door platform is being rebuilt for more homes, more
                doors, and a cleaner app experience. The API is already quietly
                waiting under <strong>/api</strong>.
            </p>
        </main>
    </body>
</html>
